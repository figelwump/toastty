# Toastty terminal profile example for zmx
#
# Each profiled pane gets a stable Toastty panel ID that persists across
# workspace restore. This example uses that ID as the zmx session name, so
# restarting Toastty reconnects the pane to the same persistent session.
#
# Live title updates inside the zmx session still depend on shell-side
# integration. Use Terminal > Install Shell Integration… or see the README
# manual setup instructions before relying on title-based panel metadata.

[zmx]
displayName = "ZMX"
badge = "ZMX"
startupCommand = "zmx attach toastty.$TOASTTY_PANEL_ID"
