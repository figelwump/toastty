<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Toastty App Icon Concept 03 - Toaster Terminal Contrast Direction</title>
  <desc>Darker contrast direction where a toaster body doubles as a terminal surface and the toast carries a prompt glyph.</desc>
  <defs>
    <linearGradient id="bgC" x1="200" y1="104" x2="860" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222222"/>
      <stop offset="0.52" stop-color="#151515"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="amberGlowC" x1="512" y1="258" x2="512" y2="744" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD481"/>
      <stop offset="1" stop-color="#D9721E"/>
    </linearGradient>
    <linearGradient id="toastC" x1="512" y1="294" x2="512" y2="654" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4D6B0"/>
      <stop offset="1" stop-color="#CE8342"/>
    </linearGradient>
    <radialGradient id="haloC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 470) rotate(90) scale(312 328)">
      <stop offset="0" stop-color="#F7B340" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#F7B340" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadowC" x="82" y="58" width="860" height="930" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.44"/>
    </filter>
  </defs>

  <g filter="url(#shadowC)">
    <rect x="112" y="88" width="800" height="800" rx="188" fill="url(#bgC)"/>
    <rect x="126" y="102" width="772" height="772" rx="174" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <rect x="160" y="136" width="704" height="704" rx="156" fill="url(#haloC)"/>
  </g>

  <rect x="250" y="540" width="524" height="160" rx="66" fill="#272727"/>
  <rect x="268" y="556" width="488" height="126" rx="54" fill="#121212"/>
  <rect x="306" y="578" width="412" height="24" rx="12" fill="#2D2D2D"/>
  <circle cx="710" cy="642" r="18" fill="#F5A623"/>
  <circle cx="710" cy="642" r="8" fill="#FFE2A0" opacity="0.78"/>

  <path d="M372 598V430C372 336 434 294 512 294C590 294 652 336 652 430V598H372Z" fill="#7B4020"/>
  <path d="M404 584V438C404 364 452 330 512 330C572 330 620 364 620 438V584H404Z" fill="url(#toastC)"/>
  <rect x="456" y="430" width="112" height="78" rx="18" fill="url(#amberGlowC)"/>
  <path d="M444 534H580" stroke="#7C431C" stroke-width="18" stroke-linecap="round" opacity="0.44"/>
  <path d="M418 602L460 566" stroke="#F5A623" stroke-width="18" stroke-linecap="round"/>
  <path d="M418 642H480" stroke="#F5A623" stroke-width="18" stroke-linecap="round"/>

  <g opacity="0.78">
    <path d="M396 284C371 250 376 218 405 186" stroke="#F7C06B" stroke-width="14" stroke-linecap="round"/>
    <path d="M512 266C488 232 492 200 522 168" stroke="#F7C06B" stroke-width="14" stroke-linecap="round"/>
    <path d="M628 286C601 250 606 218 636 188" stroke="#F7C06B" stroke-width="14" stroke-linecap="round"/>
  </g>
</svg>
