<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Toastty App Icon Concept 02 - Butter Grid</title>
  <desc>Bakery-forward toast icon with a four-pane butter grid to represent split workspaces in a modern Mac app icon shape.</desc>
  <defs>
